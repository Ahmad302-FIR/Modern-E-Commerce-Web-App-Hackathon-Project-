<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details - EcoShop</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">EcoShop</a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#products">Products</a></li>
      </ul>
      <div class="nav-icons">
        <span class="user-name" id="userName"></span>
        <a href="wishlist.html" class="icon-link">
          <i class="fas fa-heart"></i>
          <span class="badge" id="wishlistBadge">0</span>
        </a>
        <a href="cart.html" class="icon-link">
          <i class="fas fa-shopping-cart"></i>
          <span class="badge" id="cartBadge">0</span>
        </a>
        <button class="theme-toggle" id="themeToggle">
          <i class="fas fa-moon"></i>
        </button>
        <button class="btn btn-primary" id="logoutBtn" style="display: none">
          Logout
        </button>
      </div>
    </nav>

    <div class="cart-container" id="productDetail"></div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>
  </body>
</html>
